apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-api
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/abhigyan-mohanta/k8s-gitops-delivery-platform
    targetRevision: HEAD
    path: apps/task-api

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

